<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Page</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    color: white;
    margin: 0;
}

/* Navbar */
.navbar {
    background: #111;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    font-size: 18px;
}

.navbar a {
    text-decoration: none;
    color: white;
    background: #4CAF50;
    padding: 8px 15px;
    border-radius: 8px;
    transition: 0.3s;
}

.navbar a:hover {
    background: #45a049;
}

/* Center box */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 60px);
}

.card {
    background: #2c2c44;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.buttons {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.yes {
    background-color: #4CAF50;
}

.no {
    background-color: #f44336;
}

button:hover {
    transform: scale(1.1);
}

#message {
    margin-top: 20px;
    font-size: 14px;
    color: #ccc;
}
</style>

</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h1>My Website</h1>
    <a href="index.html">🏠 Home</a>
</div>

<!-- Main Content -->
<div class="container">
    <div class="card">
        <h2>Was this helpful?</h2>

        <div class="buttons">
            <button class="yes" onclick="feedback('yes')">👍 Yes</button>
            <button class="no" onclick="feedback('no')">👎 No</button>
        </div>

        <p id="message"></p>
    </div>
</div>

<script>
function feedback(type) {
    let msg = document.getElementById("message");

    if (type === "yes") {
        msg.innerHTML = "😊 Thanks for your feedback!";
    } else {
        msg.innerHTML = "😔 Sorry! We'll improve.";
    }
}
</script>

</body>
</html>
