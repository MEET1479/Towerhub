<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: "Segoe UI", sans-serif;
    margin: 0;
}

header, footer {
    background: #020617;
    padding: 20px;
    text-align: center;
}

header h2 {
    color: #38bdf8;
}

.content {
    max-width: 800px;
    margin: 50px auto;
    padding: 30px;
    background: #1e293b;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
}

h1 {
    color: #38bdf8;
    margin-bottom: 20px;
}

.contact-box {
    background: #020617;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
    transition: 0.3s;
}

.contact-box:hover {
    transform: scale(1.05);
    background: #0f172a;
}

.contact-title {
    font-size: 18px;
    color: #38bdf8;
    margin-bottom: 5px;
}

.contact-info {
    font-size: 16px;
    color: #cbd5f5;
}

footer a {
    color: #38bdf8;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}
</style>

</head>
<body>

<header>
<h2>H.M L.T HUB</h2>
</header>

<div class="content">
<h1>Contact Us</h1>

<div class="contact-box">
    <div class="contact-title">📧 Email</div>
    <div class="contact-info">your@email.com</div>
</div>

<div class="contact-box">
    <div class="contact-title">📞 Phone</div>
    <div class="contact-info">+91 1234567890</div>
</div>

<div class="contact-box">
    <div class="contact-title">📍 Address</div>
    <div class="contact-info">Your City, India</div>
</div>

</div>

<footer>
<a href="index.html">⬅ Back to Home</a>
</footer>

</body>
</html>
